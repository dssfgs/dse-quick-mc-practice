<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MC 練習</title>
  <style>
    body{font-family:-apple-system,"Microsoft JhengHei",sans-serif;max-width:720px;margin:0 auto;padding:16px;background:#f5f5f7;color:#1d1d1f}
    h1{font-size:22px}
    .card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
    .cat{color:#666;font-size:13px;margin-bottom:6px}
    .q{font-size:18px;font-weight:600;margin-bottom:14px;white-space:pre-wrap}
    .opt{display:block;width:100%;text-align:left;padding:12px 14px;margin:8px 0;border:1px solid #ccc;border-radius:10px;background:#fff;cursor:pointer;font-size:16px}
    .opt:hover{background:#f0f0f5}
    .opt.correct{background:#d8f5d8;border-color:#4caf50}
    .opt.wrong{background:#ffd8d8;border-color:#e53935}
    .opt:disabled{cursor:default}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    button.act{padding:10px 16px;border:none;border-radius:10px;background:#0071e3;color:#fff;font-size:15px;cursor:pointer}
    button.act.gray{background:#8e8e93}
    button.act.red{background:#e53935}
    button.act.green{background:#34a853}
    .progress{font-size:14px;color:#555;margin-bottom:8px}
    .explain{margin-top:12px;font-size:14px;color:#444;background:#fafafa;padding:10px;border-radius:8px;white-space:pre-wrap}
    select{padding:8px;border-radius:8px;border:1px solid #ccc;font-size:15px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border:1px solid #e0e0e0;padding:6px 8px;text-align:center}
    th{background:#f0f0f5}
    .hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    #topicBox{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    #topicBox label{background:#f0f0f5;padding:6px 12px;border-radius:20px;font-size:14px;cursor:pointer}
    #topicBox input{margin-right:4px}
    .cnt{color:#0071e3;font-weight:600}
    .total-line{font-size:13px;color:#555;margin-bottom:10px}
    .field{margin-bottom:10px}
    .field label{display:block;margin-bottom:4px;font-size:14px}
    .field input{width:100%;padding:8px;border-radius:8px;border:1px solid #ccc;font-size:15px;box-sizing:border-box}
    #uploadStatus{margin-top:10px;font-size:13px;color:#555;white-space:pre-wrap}
  </style>

  <script>
    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>

<body>
  <h1>📝 MC 練習</h1>

  <div class="card">
    <div style="margin-bottom:10px;"><strong>選擇主題（可多選，做混合練習）</strong></div>
    <div id="topicBox"></div>
    <div class="total-line" id="totalLine"></div>

    <div class="controls">
      <label>題數：</label>
      <select id="countSelect">
        <option value="10">10 題</option>
        <option value="15">15 題</option>
        <option value="20">20 題</option>
        <option value="all">全部</option>
      </select>
      <button class="act" onclick="startNormal()">開始練習</button>
      <button class="act gray" onclick="startWrong()">錯題重溫 (<span id="wrongCount">0</span>)</button>
    </div>

    <div class="progress" id="progress"></div>
    <div class="progress" id="scoreBar"></div>
    <div class="progress" id="timerBar"></div>
  </div>

  <div id="quiz"></div>

<div class="card" id="uploadCard" style="display:none;">
  <div style="margin-bottom:10px;"><strong>學生資料與成績上傳</strong></div>

    <div class="field">
      <label>姓名：</label>
      <input id="stuName" type="text" placeholder="請輸入姓名">
    </div>

    <div class="field">
      <label>班別（例如：1A、2B、3C）：</label>
      <input id="stuClass" type="text" placeholder="例如：1A">
    </div>

    <div class="field">
      <label>學號：</label>
      <input id="stuNo" type="text" placeholder="請輸入學號">
    </div>

    <button class="act green" onclick="uploadResultToSheet()">上傳本次作答成績到老師 Google Sheet</button>
    <div id="uploadStatus"></div>
  </div>

  <div class="card">
    <div class="hist-head">
      <strong>📈 歷史紀錄</strong>
      <button class="act red" onclick="clearHistory()">清空紀錄</button>
    </div>
    <div id="historyBox"></div>
  </div>

  <script src="questions.js"></script>

  <script>
    // ===== 原本的 quiz 程式（保留你的架構）=====
    let pool, idx = 0, mode = 'normal', curCat;
    let wrongList = loadWrong();
    let history = loadHistory();
    let answered = 0, correct = 0;
    let startTime = 0, elapsed = 0, timerId = null;

    function typeset(){ if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(); }
    function fmt(sec){ const m=Math.floor(sec/60), s=sec%60; return (m>0?m+'分':'')+s+'秒'; }

    function startTimer(){
      startTime=Date.now(); elapsed=0;
      clearInterval(timerId);
      timerId=setInterval(()=>{ elapsed=Math.floor((Date.now()-startTime)/1000); document.getElementById('timerBar').textContent='已用時間：'+fmt(elapsed); },1000);
      document.getElementById('timerBar').textContent='已用時間：0秒';
    }
    function stopTimer(){ clearInterval(timerId); timerId=null; elapsed=Math.floor((Date.now()-startTime)/1000); }

    function updateScore(){
      const rate = answered===0?0:Math.round(correct/answered*100);
      document.getElementById('scoreBar').textContent='作答：'+correct+' / '+answered+' 題，正確率 '+rate+'%';
    }

    function loadWrong(){ try{ return JSON.parse(localStorage.getItem('mcwrong'))||[]; }catch(e){ return []; } }
    function saveWrong(){ localStorage.setItem('mcwrong',JSON.stringify(wrongList)); document.getElementById('wrongCount').textContent=wrongList.length; }
    function keyOf(q){ return q.question; }

    function loadHistory(){ try{ return JSON.parse(localStorage.getItem('mchistory'))||[]; }catch(e){ return []; } }
    function saveHistory(){ localStorage.setItem('mchistory',JSON.stringify(history)); }

    function addHistory(){
      if(answered===0) return;
      const n=new Date();
      const stamp=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
      const rate=answered===0?0:Math.round(correct/answered*100);
      history.unshift({ time:stamp, mode:(mode==='wrong'?'錯題重溫':'一般練習'), cat:(mode==='wrong'?'錯題混合':(curCat||'多主題混合')), correct, total:answered, rate, secs:elapsed });
      saveHistory(); renderHistory();
    }

    function clearHistory(){ if(!confirm('確定要清空所有歷史紀錄？')) return; history=[]; saveHistory(); renderHistory(); }

    function renderHistory(){
      const box=document.getElementById('historyBox');
      if(history.length===0){ box.innerHTML='<div style="color:#888;">目前沒有紀錄。</div>'; return; }
      let trend='';
      if(history.length>=2){
        const d=history[0].rate-history[1].rate;
        trend = d>0 ? '<div style="color:#2e7d32;margin-bottom:8px;">最近一次比上一次進步 '+d+'%</div>'
              : d<0 ? '<div style="color:#c62828;margin-bottom:8px;">最近一次比上一次下降 '+(-d)+'%</div>'
              : '<div style="color:#666;margin-bottom:8px;">最近兩次正確率一樣。</div>';
      } else trend='<div style="color:#666;margin-bottom:8px;">目前只有一筆紀錄。</div>';

      const rows=history.map(h=>'<tr><td>'+h.time+'</td><td>'+h.mode+'</td><td>'+h.cat+'</td><td>'+h.correct+'/'+h.total+'</td><td>'+h.rate+'%</td><td>'+fmt(h.secs)+'</td></tr>').join('');
      box.innerHTML=trend+'<table><tr><th>時間</th><th>模式</th><th>主題</th><th>成績</th><th>正確率</th><th>用時</th></tr>'+rows+'</table>';
    }

    function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function countByCat(){ const m={}; QUESTIONS.forEach(q=>m[q.category]=(m[q.category]||0)+1); return m; }

    function initCategories(){
      if(typeof QUESTIONS==='undefined'){ document.body.innerHTML='<h2>找不到 questions.js</h2>'; return; }
      const counts=countByCat(); const cats=Object.keys(counts); const box=document.getElementById('topicBox');
      box.innerHTML =
        '<label><input type="checkbox" id="topicAll" checked onchange="toggleAll()">全部</label>' +
        cats.map(c=>'<label><input type="checkbox" class="topicChk" value="'+c+'" checked onchange="syncAll();updateTotal();">'+c+' (<span class="cnt">'+counts[c]+'</span>)</label>').join('');
      saveWrong(); renderHistory(); updateTotal(); updateScore();
    }

    function toggleAll(){ const on=document.getElementById('topicAll').checked; document.querySelectorAll('.topicChk').forEach(c=>c.checked=on); updateTotal(); }
    function syncAll(){ const all=document.querySelectorAll('.topicChk'); const checked=document.querySelectorAll('.topicChk:checked'); document.getElementById('topicAll').checked=(all.length===checked.length); }
    function selectedTopics(){ return Array.from(document.querySelectorAll('.topicChk:checked')).map(c=>c.value); }

    function updateTotal(){
      const topics=selectedTopics();
      const total=QUESTIONS.filter(q=>topics.includes(q.category)).length;
      document.getElementById('totalLine').textContent = topics.length===0 ? '請先選擇至少一個主題。' : '目前選擇主題共有 '+total+' 題。';
    }

    function startNormal(){
      mode='normal';
      document.getElementById('uploadCard').style.display = 'none';  // 新測驗開始→隱藏
      const status=document.getElementById('uploadStatus');
      if(status){ status.textContent=''; }                          // 清掉上次的訊息
      const topics=selectedTopics();
      if(topics.length===0){ alert('請先選擇主題。'); return; }
      const allCats=Object.keys(countByCat());
      curCat = topics.length===1 ? topics[0] : (topics.length===allCats.length ? '全部' : topics.join(' / '));

      let list=QUESTIONS.filter(q=>topics.includes(q.category));
      list=shuffle(list);

      const want=document.getElementById('countSelect').value;
      if(want!=='all'){
        const n=parseInt(want,10);
        if(list.length<n) alert('目前只有 '+list.length+' 題，無法出 '+n+' 題。');
        list=list.slice(0,n);
      }
      pool=list; idx=0; answered=0; correct=0;
      updateScore(); startTimer(); render();
    }

    function startWrong(){
      mode='wrong';
      document.getElementById('uploadCard').style.display = 'none';  // 新測驗開始→隱藏
      const status=document.getElementById('uploadStatus');
      if(status){ status.textContent=''; }                          // 清掉上次的訊息
      let list=QUESTIONS.filter(q=>wrongList.includes(keyOf(q)));
      if(list.length===0){ alert('目前沒有錯題可以重溫。'); return; }
      pool=shuffle(list); idx=0; answered=0; correct=0; curCat='錯題混合';
      updateScore(); startTimer(); render();
    }

    function render(){
      const quiz=document.getElementById('quiz');
      if(idx>=pool.length){
        stopTimer(); addHistory();
        const rate=answered?Math.round(correct/answered*100):0;
        const avg=answered?Math.round(elapsed/answered*10)/10:0;
        quiz.innerHTML =
          '<div class="card"><div class="q">本次練習完成！</div>' +
          '<div>模式：'+(mode==='wrong'?'錯題重溫':'一般練習')+'</div>' +
          '<div>主題：'+(curCat||'多主題混合')+'</div>' +
          '<div>成績：'+correct+' / '+answered+' 題，正確率 '+rate+'%</div>' +
          '<div>總用時：'+fmt(elapsed)+'</div>' +
          '<div>平均每題：'+avg+' 秒</div>' +
          '<button class="act" style="margin-top:12px;" onclick="'+(mode==='wrong'?'startWrong()':'startNormal()')+'">再做一次</button></div>';

        document.getElementById('uploadCard').style.display = 'block';  // 測驗完成→顯示上傳區
        document.getElementById('progress').textContent='';
        return;
      }

      const q=pool[idx];
      document.getElementById('progress').textContent='第 '+(idx+1)+' 題 / 共 '+pool.length+' 題（模式：'+(mode==='wrong'?'錯題重溫':'一般練習')+'）';

      let html='<div class="card"><div class="cat">'+q.category+'</div><div class="q">'+q.question+'</div>';
      q.options.forEach((opt,i)=>{ html+='<button class="opt" onclick="answer('+i+', this)">'+opt+'</button>'; });
      html+='<div id="exp"></div></div>';
      quiz.innerHTML=html;
      typeset();
    }

    function answer(choice, btn){
      const q=pool[idx];
      const buttons=document.querySelectorAll('.opt');
      buttons.forEach((b,i)=>{ b.disabled=true; if(i===q.answer) b.classList.add('correct'); });

      const k=keyOf(q);
      answered++;
      if(choice===q.answer){
        correct++;
        wrongList=wrongList.filter(x=>x!==k);
      } else {
        btn.classList.add('wrong');
        if(!wrongList.includes(k)) wrongList.push(k);
      }
      saveWrong(); updateScore();

      if(q.explain){
        document.getElementById('exp').innerHTML='<div class="explain">解釋：<br>'+q.explain+'</div>';
        typeset();
      }

      const card=document.getElementById('quiz').querySelector('.card');
      const nextBtn=document.createElement('button');
      nextBtn.className='act'; nextBtn.style.marginTop='12px';
      nextBtn.textContent = (idx+1>=pool.length) ? '完成練習' : '下一題';
      nextBtn.onclick=()=>{ idx++; render(); };
      card.appendChild(nextBtn);
    }

    // ===== 上傳到 Google Sheet =====
    const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzrL--eEByEWLKbYeI8fLHY2xHMk5Yj9w-piIAQAe-fJd3u9eAuoRa1_PIluXZ_du8/exec'; // ← 改這行

    function uploadResultToSheet(){
      const name=document.getElementById('stuName').value.trim();
      const className=document.getElementById('stuClass').value.trim();
      const classNo=document.getElementById('stuNo').value.trim();
      const status=document.getElementById('uploadStatus');

      if(!name || !className || !classNo){
        status.textContent='請先填寫姓名、班別和學號。'; status.style.color='#c62828'; return;
      }
      if(answered===0){
        status.textContent='你還沒有作答任何題目，請先作答再上傳成績。'; status.style.color='#c62828'; return;
      }
      if(SHEET_WEBAPP_URL.includes('XXXX')){
        status.textContent='請先在 index.html 把 SHEET_WEBAPP_URL 改成老師的 Apps Script Web App URL。';
        status.style.color='#c62828'; return;
      }

      const rate = answered===0?0:Math.round(correct/answered*100);
      const payload = { name, className, classNo, mode, category:curCat, answered, correct, rate, elapsedSeconds:elapsed };

      status.textContent='上傳中...'; status.style.color='#555';

      // 用 text/plain 避免 CORS 預檢
      fetch(SHEET_WEBAPP_URL, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
  .then(r=>r.json())
  .then(d=>{
    if(d.ok){
      status.textContent='上傳成功！如班別是新班別，老師的 Sheet 會自動新增同名分頁。';
      status.style.color='#2e7d32';

      // ★ 在上傳成功之後，把整個上傳卡片隱藏起來
      const card = document.getElementById('uploadCard');
      if (card) {
        card.style.display = 'none';
      }

    } else {
      status.textContent='上傳失敗：'+(d.error||'未知錯誤');
      status.style.color='#c62828';
    }
  })
      .catch(err=>{
        status.textContent='上傳失敗（可能是 CORS / 網路問題）：'+err;
        status.style.color='#c62828';
      });
    }

    initCategories();
  </script>
</body>
</html>
